{{- if not .Values.lark.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kato-bot.name" . }}
  labels:
    {{- include "kato-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  LARK_APP_ID: {{ required "lark.appId is required (or set lark.existingSecret)" .Values.lark.appId | quote }}
  LARK_APP_SECRET: {{ required "lark.appSecret is required (or set lark.existingSecret)" .Values.lark.appSecret | quote }}
{{- end }}
