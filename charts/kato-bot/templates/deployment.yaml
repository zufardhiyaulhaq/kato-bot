apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kato-bot.name" . }}
  labels:
    {{- include "kato-bot.labels" . | nindent 4 }}
spec:
  replicas: 1            # single replica: dial-out WebSocket, no inbound traffic
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kato-bot.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "kato-bot.labels" . | nindent 8 }}
      annotations:
        checksum/clusters: {{ include (print $.Template.BasePath "/clusters-configmap.yaml") . | sha256sum }}
    spec:
      volumes:
        - name: clusters
          configMap:
            name: {{ include "kato-bot.name" . }}-clusters
      containers:
        - name: kato-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            # Use a pre-existing Secret (must hold LARK_APP_ID + LARK_APP_SECRET) when
            # lark.existingSecret is set; otherwise the chart-managed Secret.
            - secretRef:
                name: {{ .Values.lark.existingSecret | default (include "kato-bot.name" .) }}
          env:
            - name: LARK_BASE_URL
              value: {{ .Values.larkBaseUrl | quote }}
            - name: KATO_CLUSTERS_FILE
              value: /etc/kato-bot/clusters.yaml
            - name: KATO_RUN_TIMEOUT
              value: {{ .Values.katoRunTimeout | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: MAX_CONCURRENT_RUNS
              value: {{ .Values.maxConcurrentRuns | quote }}
          volumeMounts:
            - name: clusters
              mountPath: /etc/kato-bot
              readOnly: true
          ports:
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
