image:
  # -- Container image repository.
  repository: ghcr.io/zufardhiyaulhaq/kato-bot
  # -- Image tag. Defaults to the chart appVersion when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Lark open-platform base URL. Lark international: https://open.larksuite.com; Feishu (China): https://open.feishu.cn.
larkBaseUrl: https://open.larksuite.com
# -- kato REST API base URL (in-cluster Service DNS).
katoBaseUrl: http://kato.kato.svc:8080
# -- Per-run client timeout for kato's synchronous POST /run (Go duration).
katoRunTimeout: 60s
# -- Lark SDK log verbosity (debug / info / warn / error).
logLevel: info
# -- Max in-flight kato runs before new submits get a "kato is busy" card.
maxConcurrentRuns: 4

lark:
  # -- Name of a pre-existing Secret holding LARK_APP_ID and LARK_APP_SECRET. When set,
  # the chart references it and does NOT create its own Secret (appId/appSecret ignored).
  existingSecret: ""
  # -- Lark app id. Required unless lark.existingSecret is set.
  appId: ""
  # -- Lark app secret. Required unless lark.existingSecret is set.
  appSecret: ""

# -- Pod resource requests and limits.
resources: {}
# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}
